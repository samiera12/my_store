<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav>
  <a href="index.html" class="logo">MyStore</a>
  <div id="nav-auth"></div>
</nav>
<div class="form-card">
  <h2>Login</h2>
  <p id="error-msg" class="error-msg"></p>
  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password">
  </div>
  <button class="btn btn-primary btn-block" onclick="doLogin()">Login</button>
  <p class="form-footer">No account? <a href="register.html">Register here</a></p>
</div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  updateNavbar();

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const { ok, data } = await login(username, password);
    if (ok) {
      saveAuth(data);
      window.location.href = 'index.html';
    } else {
      document.getElementById('error-msg').textContent = 'Invalid username or password.';
    }
  }
</script>
</body>
</html>
