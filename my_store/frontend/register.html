<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav>
  <a href="index.html" class="logo">MyStore</a>
  <div id="nav-auth"></div>
</nav>
<div class="form-card">
  <h2>Create Account</h2>
  <p id="error-msg" class="error-msg"></p>
  <div class="form-group">
    <label>Username</label>
    <input type="text" id="username" placeholder="Choose a username">
  </div>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="Your email">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Min 8 characters">
  </div>
  <div class="form-group">
    <label>Confirm Password</label>
    <input type="password" id="password2" placeholder="Repeat password">
  </div>
  <button class="btn btn-primary btn-block" onclick="doRegister()">Create Account</button>
  <p class="form-footer">Already have an account? <a href="login.html">Login</a></p>
</div>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
  updateNavbar();

  async function doRegister() {
    const username  = document.getElementById('username').value.trim();
    const email     = document.getElementById('email').value.trim();
    const password  = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    const errEl     = document.getElementById('error-msg');

    if (password !== password2) {
      errEl.textContent = 'Passwords do not match.';
      return;
    }
    const { ok, data } = await register(username, email, password, password2);
    if (ok) {
      saveAuth(data);
      window.location.href = 'index.html';
    } else {
      const msgs = Object.values(data).flat().join(' ');
      errEl.textContent = msgs;
    }
  }
</script>
</body>
</html>
